version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: job_search_db
    environment:
      - POSTGRES_USER=tural_user
      - POSTGRES_PASSWORD=tural_pass
      - POSTGRES_DB=job_search_api_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: